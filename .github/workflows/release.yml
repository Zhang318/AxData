name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Upload built distributions to PyPI. Keep false for a build-only dry run."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and check axdata distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Validate release version
        env:
          PUBLISH_REQUESTED: ${{ github.event_name == 'release' || inputs.publish == true }}
          RELEASE_TAG: ${{ github.event.release.tag_name || github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("packages/axdata-sdk/pyproject.toml").read_text(encoding="utf-8"))
          version = data["project"]["version"]
          publish_requested = os.environ["PUBLISH_REQUESTED"].lower() == "true"
          tag = os.environ["RELEASE_TAG"]
          ref_type = os.environ["REF_TYPE"]

          if publish_requested:
              expected_tags = {version, f"v{version}"}
              if tag not in expected_tags:
                  raise SystemExit(
                      f"Release tag must be {version!r} or v{version!r}; got {tag!r}"
                  )
              if os.environ["GITHUB_EVENT_NAME"] != "release" and ref_type != "tag":
                  raise SystemExit("Manual PyPI publish must run from a git tag, not a branch.")

          print(f"Release package version: {version}")
          PY

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Run PyPI readiness check
        run: python scripts/pypi_readiness.py --json

      - name: Build release distribution
        run: python scripts/build_pypi_dist.py --output release-dist/axdata --json

      - name: Check release distribution
        run: python -m twine check release-dist/axdata/*

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dists
          path: release-dist
          if-no-files-found: error

  attach-release-assets:
    name: Attach distributions to GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    permissions:
      contents: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-dists
          path: release-dist

      - name: Upload assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" release-dist/axdata/* --repo "$GITHUB_REPOSITORY" --clobber

  publish:
    name: Publish axdata to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release' || inputs.publish == true
    environment:
      name: pypi-axdata
      url: https://pypi.org/project/axdata/
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-dists
          path: release-dist

      - name: Publish axdata
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: release-dist/axdata
          skip-existing: true
